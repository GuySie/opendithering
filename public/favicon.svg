<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 8×8 Bayer ordered dither, diagonal gradient black (top-left) → white (bottom-right) -->
  <!-- Each cell is 4×4 px; black background, white rects for lit pixels -->
  <rect width="32" height="32" fill="#000"/>
  <!-- row 0 -->
  <rect x="8"  y="0"  width="4" height="4" fill="#fff"/>
  <rect x="16" y="0"  width="4" height="4" fill="#fff"/>
  <rect x="20" y="0"  width="4" height="4" fill="#fff"/>
  <rect x="24" y="0"  width="4" height="4" fill="#fff"/>
  <rect x="28" y="0"  width="4" height="4" fill="#fff"/>
  <!-- row 1 -->
  <rect x="12" y="4"  width="4" height="4" fill="#fff"/>
  <rect x="20" y="4"  width="4" height="4" fill="#fff"/>
  <rect x="28" y="4"  width="4" height="4" fill="#fff"/>
  <!-- row 2 -->
  <rect x="0"  y="8"  width="4" height="4" fill="#fff"/>
  <rect x="8"  y="8"  width="4" height="4" fill="#fff"/>
  <rect x="16" y="8"  width="4" height="4" fill="#fff"/>
  <rect x="20" y="8"  width="4" height="4" fill="#fff"/>
  <rect x="24" y="8"  width="4" height="4" fill="#fff"/>
  <rect x="28" y="8"  width="4" height="4" fill="#fff"/>
  <!-- row 3 -->
  <rect x="12" y="12" width="4" height="4" fill="#fff"/>
  <rect x="20" y="12" width="4" height="4" fill="#fff"/>
  <rect x="24" y="12" width="4" height="4" fill="#fff"/>
  <rect x="28" y="12" width="4" height="4" fill="#fff"/>
  <!-- row 4 -->
  <rect x="0"  y="16" width="4" height="4" fill="#fff"/>
  <rect x="8"  y="16" width="4" height="4" fill="#fff"/>
  <rect x="12" y="16" width="4" height="4" fill="#fff"/>
  <rect x="16" y="16" width="4" height="4" fill="#fff"/>
  <rect x="20" y="16" width="4" height="4" fill="#fff"/>
  <rect x="24" y="16" width="4" height="4" fill="#fff"/>
  <rect x="28" y="16" width="4" height="4" fill="#fff"/>
  <!-- row 5 -->
  <rect x="4"  y="20" width="4" height="4" fill="#fff"/>
  <rect x="12" y="20" width="4" height="4" fill="#fff"/>
  <rect x="16" y="20" width="4" height="4" fill="#fff"/>
  <rect x="20" y="20" width="4" height="4" fill="#fff"/>
  <rect x="24" y="20" width="4" height="4" fill="#fff"/>
  <rect x="28" y="20" width="4" height="4" fill="#fff"/>
  <!-- row 6: all white -->
  <rect x="0"  y="24" width="32" height="4" fill="#fff"/>
  <!-- row 7 -->
  <rect x="4"  y="28" width="4" height="4" fill="#fff"/>
  <rect x="8"  y="28" width="4" height="4" fill="#fff"/>
  <rect x="12" y="28" width="4" height="4" fill="#fff"/>
  <rect x="16" y="28" width="4" height="4" fill="#fff"/>
  <rect x="20" y="28" width="4" height="4" fill="#fff"/>
  <rect x="24" y="28" width="4" height="4" fill="#fff"/>
  <rect x="28" y="28" width="4" height="4" fill="#fff"/>
</svg>
